<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>All Assignments</h1>
    <table>
        <tr>
            <th>Assignment ID</th>
            <th>Title</th>
            <th>Subject</th>
            <th>Description</th>
            <th>Due Date</th>
            <th>Action</th>

            {% for task in tasks %}
        </tr>
        <tr>
            <td>{{ task.assignment_id }}</td>
            <td>{{ task.title }}</td>
            <td>{{ task.subject }}</td>
            <td>{{ task.descr }}</td>
            <td>{{ task.due_date }}</td>
            <td>
                <form action="{{ url_for('complete_asgmt') }}" method="post">
                    <input type="hidden" name="assignment_id" value="{{task.assignment_id}}">
                    <button type="submit">Complete</button>
                </form>
            </td>
        </tr>
            {% endfor %}
    </table>
    <br><br>
    <a href="{{ url_for('home') }}">Home</a>
</body>
</html>
